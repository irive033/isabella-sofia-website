    // Walk the generated HTML for data:image/...;base64,... URIs, upload each
    // unique one to images/uploads/YYYY/MM/<sha1-12>.<ext> in the repo, and
    // return the HTML with the URIs replaced by relative paths.
    //
    // Without this, every uploaded image gets baked into the post HTML as a
    // multi-MB base64 blob (one capsule-wardrobe post hit 10 MB). Identical
    // images dedup by content hash, both within one publish and across posts
    // — files that already exist in the repo are skipped, so republishing or
    // reusing an image elsewhere costs nothing.
    async function uploadEmbeddedImages(html, headers, statusEl) {
      // Match either an image data URI or an application/pdf data URI. Both
      // go through the same hash-dedup-upload pipeline; only the destination
      // folder and commit message differ by kind.
      const re = /data:(image\/[a-zA-Z0-9.+-]+|application\/pdf);base64,([A-Za-z0-9+/=]+)/g;
      const unique = new Map(); // b64 -> mime
      let m;
      while ((m = re.exec(html)) !== null) {
        if (!unique.has(m[2])) unique.set(m[2], m[1]);
      }
      if (unique.size === 0) return html;

      const mimeToExt = (mime) => {
        let ext = mime.toLowerCase();
        // image/jpeg → jpg, image/svg+xml → svg, image/x-icon → icon, etc.
        ext = ext.replace(/^image\//, '').replace(/^application\//, '');
        if (ext === 'jpeg') return 'jpg';
        if (ext === 'svg+xml') return 'svg';
        if (ext.startsWith('x-')) ext = ext.slice(2);
        return ext.split('+')[0];
      };
      const isImage = (mime) => mime.startsWith('image/');

      const now = new Date();
      const ym = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}`;
      const imageDir = `images/uploads/${ym}`;
      const fileDir = `files/uploads/${ym}`;

      const replacements = new Map();
      let i = 0;
      for (const [b64, mime] of unique) {
        i++;
        const kind = isImage(mime) ? 'image' : 'file';
        if (statusEl) {
          statusEl.textContent = `Uploading ${kind} ${i} of ${unique.size}...`;
          statusEl.className = 'status-msg loading';
        }

        // Hash the decoded bytes — same content yields same filename, which
        // is what makes the cross-post dedup work.
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let j = 0; j < bin.length; j++) bytes[j] = bin.charCodeAt(j);
        const digest = await crypto.subtle.digest('SHA-1', bytes);
        const hash = Array.from(new Uint8Array(digest))
          .map(b => b.toString(16).padStart(2, '0'))
          .join('')
          .slice(0, 12);
        const ext = mimeToExt(mime);
        const repoPath = `${isImage(mime) ? imageDir : fileDir}/${hash}.${ext}`;

        // If the same content already lives at this path, no PUT needed.
        const checkResp = await fetch(
          `https://api.github.com/repos/${GITHUB_REPO}/contents/${repoPath}?ref=${GITHUB_BRANCH}`,
          { headers: { 'Authorization': headers.Authorization }, cache: 'no-store' }
        );
        if (!checkResp.ok) {
          const putResp = await fetch(
            `https://api.github.com/repos/${GITHUB_REPO}/contents/${repoPath}`,
            {
              method: 'PUT',
              headers,
              body: JSON.stringify({
                message: `Upload ${kind}: ${hash}.${ext}`,
                content: b64,
                branch: GITHUB_BRANCH,
              }),
            }
          );
          if (!putResp.ok) {
            const err = await putResp.json().catch(() => ({}));
            throw new Error(`${kind[0].toUpperCase() + kind.slice(1)} upload failed: ${err.message || putResp.statusText}`);
          }
        }
        replacements.set(b64, `../../${repoPath}`);
      }

      return html.replace(re, (full, _mime, b64) => replacements.get(b64) || full);
    }

    async function publishToGitHub() {
      const status = document.getElementById('publishStatus');
      const token = document.getElementById('githubToken').value.trim();
      const filename = document.getElementById('publishFilename').value.trim();
      const category = document.getElementById('postCategory').value;
      if (!token) { status.textContent = 'Please enter your GitHub token'; status.className = 'status-msg error'; return; }
      if (!editingFilePath && !filename) { status.textContent = 'Please enter a filename'; status.className = 'status-msg error'; return; }
      localStorage.setItem('github_token', token);
      const headers = { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' };
      const rawHtml = generatePostHTML();
      let html;
      try {
        html = await uploadEmbeddedImages(rawHtml, headers, status);
      } catch (e) {
        status.textContent = e.message;
        status.className = 'status-msg error';
        return;
      }
      const content = btoa(unescape(encodeURIComponent(html)));

      // Figure out the target path. When editing, detect a category change by
      // comparing the folder segment of the old path to the dropdown value.
      // If they differ, we'll create the file at the NEW path and delete the
      // OLD one — effectively moving it. Otherwise just overwrite in place.
      let targetPath;
      let oldPathToDelete = null;
      if (editingFilePath) {
        const oldFolder = editingFilePath.split('/')[1]; // "posts/<folder>/name.html"
        if (oldFolder !== category) {
          const name = editingFilePath.split('/').pop();
          targetPath = `posts/${category}/${name}`;
          oldPathToDelete = editingFilePath;
        } else {
          targetPath = editingFilePath;
        }
      } else {
        targetPath = `posts/${category}/${filename}.html`;
      }

      status.textContent = editingFilePath ? 'Fetching latest file...' : 'Publishing...';
      status.className = 'status-msg loading';
      try {
        // Always refresh the SHA right before PUT to avoid 409 conflicts.
        // Only needed when overwriting — a fresh path doesn't have a SHA.
        let sha = null;
        if (targetPath === editingFilePath) {
          try {
            const checkResp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${targetPath}?ref=${GITHUB_BRANCH}`, {
              headers: { 'Authorization': `token ${token}` }, cache: 'no-store'
            });
            if (checkResp.ok) { sha = (await checkResp.json()).sha; }
          } catch (e) {}
        }
        const postTitle = document.getElementById('postTitle').value;
        const commitMsg = oldPathToDelete
          ? `Move to ${category}: ${postTitle || targetPath}`
          : editingFilePath
            ? `Update: ${postTitle || targetPath}`
            : `Publish: ${postTitle || filename}`;
        const body = { message: commitMsg, content, branch: GITHUB_BRANCH };
        if (sha) body.sha = sha;

        status.textContent = oldPathToDelete
          ? 'Creating file in new category folder...'
          : (editingFilePath ? 'Committing update...' : 'Committing...');
        const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${targetPath}`, {
          method: 'PUT', headers, body: JSON.stringify(body)
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          status.textContent = `Error: ${err.message || 'Failed to publish'}`;
          status.className = 'status-msg error';
          return;
        }
        const result = await resp.json();

        // If the category changed, delete the old file. A failure here leaves
        // the post in both folders — not ideal, but the new path is correct.
        if (oldPathToDelete) {
          status.textContent = 'Removing file from old category folder...';
          try {
            const getOld = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${oldPathToDelete}?ref=${GITHUB_BRANCH}`, {
              headers: { 'Authorization': `token ${token}` }, cache: 'no-store'
            });
            if (getOld.ok) {
              const oldMeta = await getOld.json();
              await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${oldPathToDelete}`, {
                method: 'DELETE', headers,
                body: JSON.stringify({
                  message: `Delete old location after category move: ${postTitle}`,
                  sha: oldMeta.sha, branch: GITHUB_BRANCH
                })
              });
            }
          } catch (e) { /* best-effort; the new file is already in place */ }
          // Update editing state so subsequent saves target the new path.
          editingFilePath = targetPath;
          document.getElementById('editingBannerPath').textContent = targetPath;
        }

        const verb = oldPathToDelete ? 'Moved and updated' : (editingFilePath ? 'Updated' : 'Published');
        status.innerHTML = `${verb}! <a href="${result.content.html_url}" target="_blank" style="color:#0969da;">View on GitHub</a><br>Vercel will auto-deploy shortly.`;
        status.className = 'status-msg success';
        if (editingFilePath) editingFileSha = result.content.sha;
      } catch (e) {
        status.textContent = `Network error: ${e.message}`;
        status.className = 'status-msg error';
      }
    }

    // ============================================================
    // LOAD EXISTING POST
    // ============================================================
    // Flat cache of posts across all category folders, filled when the
    // modal opens. Lets tab switching filter client-side instead of
    // re-fetching per tab (and sidesteps 404s from missing folders).
    let allPostsCache = [];
    const POST_CATEGORIES = ['beauty', 'lifestyle', 'style'];
    const POST_CATEGORY_LABEL = { beauty: 'Beauty', lifestyle: 'Lifestyle', style: 'Style' };

    // Existing posts may have been saved with the legacy `wellness` slug
    // (before the Lifestyle rename). Anywhere we read a category from a
    // file, funnel it through this helper so the UI always works in the
    // new slug space. Return 'beauty' as a safe default for unknown values.
    function normalizeCategorySlug(slug) {
      const s = (slug || '').toLowerCase().trim();
      if (s === 'wellness') return 'lifestyle';
      if (['beauty', 'lifestyle', 'style'].includes(s)) return s;
      return 'beauty';
    }

    async function showLoadPostModal() {
      document.getElementById('loadPostModal').classList.add('visible');
      document.getElementById('loadPostStatus').textContent = '';
      document.getElementById('loadPostStatus').className = 'status-msg';
      await fetchAllPostsList();
      // Reset active tab to "All" each time the modal opens
      document.querySelectorAll('.load-post-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.load-post-tab[data-category="all"]').classList.add('active');
      filterPostList('all');
    }
    function closeLoadPostModal() {
      document.getElementById('loadPostModal').classList.remove('visible');
    }

    // Fetch HTML file listings from every category folder in parallel.
    // Folders that don't exist (404) are skipped silently — this avoids
    // the old bug where the Style tab hard-errored because posts/style/
    // hadn't been created yet.
    //
    // After the listings are fetched, each post's HTML is fetched in
    // parallel (via raw.githubusercontent.com — fast + cached) so we can
    // read the real <meta name="category"> tag. That way a post that lives
    // in posts/beauty/ but has category="style" in its HTML is correctly
    // shown as Style in the load modal (folder is just storage, not truth).
    async function fetchAllPostsList() {
      const listEl = document.getElementById('loadPostList');
      listEl.innerHTML = '<div class="load-post-loading">Loading posts...</div>';
      const token = localStorage.getItem('github_token');
      const headers = token ? { 'Authorization': `token ${token}` } : {};
      // GitHub's contents API sends `cache-control: max-age=60`, so a recently
      // deleted post would otherwise still appear for up to a minute. Force
      // the browser to skip its HTTP cache so the list reflects the current
      // state of the repo every time the modal opens.
      const fetchOpts = { headers, cache: 'no-store' };
      try {
        // Step 1: list every HTML file in every category folder.
        const results = await Promise.all(POST_CATEGORIES.map(async (cat) => {
          try {
            const resp = await fetch(
              `https://api.github.com/repos/${GITHUB_REPO}/contents/posts/${cat}?ref=${GITHUB_BRANCH}`,
              fetchOpts
            );
            if (!resp.ok) return []; // folder missing — just skip
            const files = await resp.json();
            return (Array.isArray(files) ? files : [])
              .filter(f => f.type === 'file' && f.name.endsWith('.html'))
              .map(f => ({
                folder: cat,
                name: f.name,
                path: `posts/${cat}/${f.name}`,
                sha: f.sha,
                // Filled in by step 2; default to folder while we wait.
                metaCategory: cat
              }));
          } catch (e) {
            return [];
          }
        }));
        allPostsCache = results.flat().sort((a, b) => a.name.localeCompare(b.name));

        // Step 2: for each post, fetch only the start of the file and parse
        // the <meta name="category"> tag out of the <head>. Use a Range
        // request so we don't download megabytes per post — some posts
        // include base64-embedded images and run to 10 MB+, which would
        // otherwise hang the modal. 8 KB is plenty to cover the head.
        listEl.innerHTML = '<div class="load-post-loading">Reading post categories...</div>';
        await Promise.all(allPostsCache.map(async (p) => {
          try {
            const raw = await fetch(
              `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${p.path}`,
              { cache: 'no-store', headers: { 'Range': 'bytes=0-8191' } }
            );
            if (!raw.ok) return;
            const html = await raw.text();
            const m = html.match(/<meta\s+name=["']category["']\s+content=["']([^"']+)["']/i);
            if (m && m[1]) p.metaCategory = normalizeCategorySlug(m[1]);
          } catch (e) { /* keep folder-based default */ }
        }));
      } catch (e) {
        listEl.innerHTML = `<div class="load-post-error">Failed to load: ${escapeHtmlText(e.message)}</div>`;
        allPostsCache = [];
      }
    }

    // Render the list, optionally filtered by folder. Called from the tab
    // buttons and after a successful delete.
    function filterPostList(filter) {
      document.querySelectorAll('.load-post-tab').forEach(t => t.classList.remove('active'));
      const tab = document.querySelector(`.load-post-tab[data-category="${filter}"]`);
      if (tab) tab.classList.add('active');

      const listEl = document.getElementById('loadPostList');
      // Filter by the post's actual category (from its <meta> tag),
      // not by which folder the file happens to live in.
      const visible = filter === 'all'
        ? allPostsCache
        : allPostsCache.filter(p => (p.metaCategory || p.folder) === filter);

      if (visible.length === 0) {
        listEl.innerHTML = '<div class="load-post-empty">No posts in this category.</div>';
        return;
      }
      listEl.innerHTML = visible.map(p => {
        const prettyName = p.name.replace(/\.html$/, '').replace(/-/g, ' ').replace(/\bamp\b/g, '&');
        const effectiveCat = p.metaCategory || p.folder;
        const label = POST_CATEGORY_LABEL[effectiveCat] || effectiveCat;
        // JSON-stringify then strip quotes for embedding in onclick attrs.
        const prettyArg = JSON.stringify(prettyName).replace(/"/g, '&quot;');
        return `
          <div class="load-post-item">
            <div class="load-post-item-body" onclick="loadPostForEditing('${p.path}', '${p.sha}')">
              <span class="load-post-item-name">${escapeHtmlText(prettyName)}</span>
              <span class="load-post-badge">${escapeHtmlText(label)}</span>
            </div>
            <button class="load-post-delete" onclick="event.stopPropagation(); deletePost('${p.path}', ${prettyArg})" title="Delete post" aria-label="Delete post">&times;</button>
          </div>`;
      }).join('');
    }

    // Legacy name kept in case anything external still calls it; delegates
    // to the new filter-based approach.
    function loadPostList(category) { filterPostList(category); }

    async function deletePost(filePath, prettyName) {
      if (!confirm(`Delete "${prettyName}"?\n\nThis removes the post file from GitHub and cannot be undone.`)) return;

      const status = document.getElementById('loadPostStatus');
      let token = localStorage.getItem('github_token');
      if (!token) {
        token = prompt('Paste your GitHub token to delete this post:');
        if (!token) return;
        localStorage.setItem('github_token', token);
      }

      status.textContent = `Deleting "${prettyName}"...`;
      status.className = 'status-msg loading';

      try {
        // Refresh the SHA right before DELETE to avoid 409 conflicts.
        const getResp = await fetch(
          `https://api.github.com/repos/${GITHUB_REPO}/contents/${filePath}?ref=${GITHUB_BRANCH}`,
          { headers: { 'Authorization': `token ${token}` } }
        );
        if (!getResp.ok) {
          const err = await getResp.json().catch(() => ({}));
          throw new Error(err.message || `Could not find file (HTTP ${getResp.status})`);
        }
        const current = await getResp.json();

        const delResp = await fetch(
          `https://api.github.com/repos/${GITHUB_REPO}/contents/${filePath}`,
          {
            method: 'DELETE',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: `Delete post: ${prettyName}`,
              sha: current.sha,
              branch: GITHUB_BRANCH
            })
          }
        );

        if (delResp.ok) {
          status.textContent = `Deleted "${prettyName}".`;
          status.className = 'status-msg success';
          // Remove from cache and re-render the list with the same active filter.
          allPostsCache = allPostsCache.filter(p => p.path !== filePath);
          const activeTab = document.querySelector('.load-post-tab.active');
          filterPostList(activeTab ? activeTab.dataset.category : 'all');
        } else {
          const err = await delResp.json().catch(() => ({}));
          status.textContent = `Failed to delete: ${err.message || delResp.statusText}`;
          status.className = 'status-msg error';
        }
      } catch (e) {
        status.textContent = `Failed: ${e.message}`;
        status.className = 'status-msg error';
      }
    }

    // One-shot migration: scan every post in the cache; for any whose current
    // folder doesn't match its meta category, create the file at the correct
    // path and delete the old copy. Also updates legacy `content="wellness"`
    // meta tags to `content="lifestyle"` so the file on disk matches the new
    // slug space going forward.
    async function migrateToCorrectFolders() {
      const status = document.getElementById('loadPostStatus');
      const mismatched = allPostsCache.filter(p =>
        p.metaCategory && p.metaCategory !== p.folder
      );
      if (mismatched.length === 0) {
        status.textContent = 'All posts are already in their correct folders — nothing to migrate.';
        status.className = 'status-msg success';
        return;
      }
      const summary = mismatched.map(p =>
        `  • ${p.name.replace(/\.html$/, '')}: ${p.folder} → ${p.metaCategory}`
      ).join('\n');
      if (!confirm(`Move ${mismatched.length} post(s) to match their category?\n\n${summary}`)) return;

      let token = localStorage.getItem('github_token');
      if (!token) {
        token = prompt('Paste your GitHub token to perform the migration:');
        if (!token) return;
        localStorage.setItem('github_token', token);
      }
      const headers = { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' };

      status.textContent = `Migrating ${mismatched.length} post(s)...`;
      status.className = 'status-msg loading';
      let moved = 0, failed = 0;
      for (const p of mismatched) {
        try {
          // 1) Fetch current file content + SHA
          const getResp = await fetch(
            `https://api.github.com/repos/${GITHUB_REPO}/contents/${p.path}?ref=${GITHUB_BRANCH}`,
            { headers: { 'Authorization': `token ${token}` }, cache: 'no-store' }
          );
          if (!getResp.ok) { failed++; continue; }
          const getJson = await getResp.json();
          let html = decodeURIComponent(escape(atob(getJson.content.replace(/\s/g, ''))));

          // 2) Normalize the meta tag in-place so the file content matches
          //    the new slug space (wellness → lifestyle).
          html = html.replace(
            /(<meta\s+name=["']category["']\s+content=["'])([^"']+)(["'][^>]*>)/i,
            (_m, pre, val, post) => pre + normalizeCategorySlug(val) + post
          );
          const newContent = btoa(unescape(encodeURIComponent(html)));

          // 3) PUT new file at the correct folder path
          const newPath = `posts/${p.metaCategory}/${p.name}`;
          const putResp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${newPath}`, {
            method: 'PUT', headers,
            body: JSON.stringify({
              message: `Migrate to ${p.metaCategory}: ${p.name.replace(/\.html$/, '')}`,
              content: newContent, branch: GITHUB_BRANCH
            })
          });
          if (!putResp.ok) { failed++; continue; }

          // 4) DELETE old file (use fresh SHA we just fetched)
          await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${p.path}`, {
            method: 'DELETE', headers,
            body: JSON.stringify({
              message: `Remove old location after migration: ${p.name.replace(/\.html$/, '')}`,
              sha: getJson.sha, branch: GITHUB_BRANCH
            })
          });

          moved++;
          status.textContent = `Migrating... ${moved}/${mismatched.length} done.`;
        } catch (e) {
          failed++;
        }
      }

      status.textContent = failed === 0
        ? `Migration complete — moved ${moved} post(s).`
        : `Moved ${moved}, failed ${failed}. Check the list and retry if needed.`;
      status.className = failed === 0 ? 'status-msg success' : 'status-msg error';

      // Refresh the list with fresh data from the remote.
      await fetchAllPostsList();
      const activeTab = document.querySelector('.load-post-tab.active');
      filterPostList(activeTab ? activeTab.dataset.category : 'all');
    }

    async function loadPostForEditing(filePath, sha) {
      const status = document.getElementById('loadPostStatus');
      status.textContent = 'Loading post...';
      status.className = 'status-msg loading';
      try {
        const token = localStorage.getItem('github_token');
        const headers = token ? { 'Authorization': `token ${token}` } : {};
        const resp = await fetch(
          `https://api.github.com/repos/${GITHUB_REPO}/contents/${filePath}?ref=${GITHUB_BRANCH}`,
          { headers }
        );
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        // GitHub's Contents API only inlines base64 content for files <= 1 MB.
        // For larger files (e.g. posts with base64-embedded images) it returns
        // encoding:"none" and an empty content field — we still get a valid
        // SHA, but have to fetch the actual bytes from the raw URL.
        let html;
        if (data.encoding === 'base64' && data.content) {
          html = decodeURIComponent(escape(atob(data.content.replace(/\s/g, ''))));
        } else {
          const rawResp = await fetch(
            `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${filePath}`,
            { cache: 'no-store' }
          );
          if (!rawResp.ok) throw new Error(`Raw HTTP ${rawResp.status}`);
          html = await rawResp.text();
        }

        const parsed = parsePostHtml(html);
        populateEditorFromParsed(parsed);

        editingFilePath = filePath;
        editingFileSha = data.sha;
        preservedDate = parsed.isoDate;

        // Show the editing banner
        document.getElementById('editingBannerPath').textContent = filePath;
        document.getElementById('editingBanner').classList.add('visible');
        document.getElementById('publishBtn').textContent = 'Save Changes';

        status.textContent = '';
        closeLoadPostModal();
      } catch (e) {
        status.textContent = `Failed: ${e.message}`;
        status.className = 'status-msg error';
      }
    }

    function exitEditMode() {
      if (!confirm('Exit edit mode and start a new blank post? Any unsaved changes will be lost.')) return;
      editingFilePath = null;
      editingFileSha = null;
      preservedDate = null;
      document.getElementById('editingBanner').classList.remove('visible');
      document.getElementById('publishBtn').textContent = 'Publish';
      // Clear the canvas and meta fields so the user starts fresh
      document.getElementById('editorCanvas').innerHTML = '';
      document.getElementById('postTitle').value = '';
      document.getElementById('postCategory').value = 'beauty';
      headerImageUrl = '';
      applyHeaderImage();
    }

    // ============================================================
    // PARSE POST HTML → BLOCKS
    // ============================================================
    function parsePostHtml(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');

      const postHeader = doc.querySelector('.post-header');
      const title = (postHeader?.querySelector('h1')?.textContent || '').trim();
      const author = (doc.querySelector('.post-meta .author')?.textContent || 'Isabella Rivera').trim();
      // Prefer the explicit meta tag (editor-generated) over the display text
      const isoDate = doc.querySelector('meta[name="date"]')?.getAttribute('content') || '';
      // Category: prefer meta tag, fall back to URL detection, then default.
      // Normalizer handles the legacy 'wellness' → 'lifestyle' rename.
      const metaCategory = doc.querySelector('meta[name="category"]')?.getAttribute('content') || '';
      const category = normalizeCategorySlug(metaCategory);

      // Header background image
      const bgImage = postHeader?.style?.backgroundImage || '';
      const headerImage = bgImage.replace(/^url\(['"]?/, '').replace(/['"]?\)$/, '') || '';

      const contentEl = doc.querySelector('.post-content');
      const blocks = [];
      if (contentEl) {
        for (const child of Array.from(contentEl.children)) {
          // A <p class="gallery-caption"> sits as a sibling AFTER its gallery
          // (that's how the legacy gallery-level caption used to be emitted).
          // Galleries now have per-image figcaptions, so we migrate: if the
          // old single caption is pipe-separated and the segment count
          // matches the slide count, split and assign to each slide. Either
          // way swallow the <p> so it doesn't end up as a stray text block.
          if (child.tagName.toLowerCase() === 'p' && child.classList.contains('gallery-caption')) {
            const last = blocks[blocks.length - 1];
            if (last && last.type === 'gallery') {
              const text = (child.textContent || '').trim();
              last.caption = text;
              const parts = text.split('|').map(p => p.trim()).filter(Boolean);
              if (parts.length === (last.slides || []).length) {
                last.slides.forEach((slide, i) => {
                  if (!slide.caption && parts[i]) slide.caption = parts[i];
                });
              }
            }
            continue;
          }
          const b = parseBlockFromElement(child);
          if (b) blocks.push(b);
        }
      }

      return { title, author, isoDate, category, headerImage, blocks };
    }

    function parseBlockFromElement(el) {
      const tag = el.tagName.toLowerCase();

      // Skip post-nav (auto-generated prev/next links)
      if (el.classList.contains('post-nav')) return null;

      // Image placeholders from Squarespace migration: no real image, just a label
      if (el.classList.contains('post-image-placeholder')) {
        return { type: 'image-placeholder', text: (el.textContent || '').trim() };
      }

      // Editor-generated image wrap: <div class="img-wrap align-X [has-side-text]">
      //   Either: [<a>]<img>[</a>][<p>caption</p>]
      //   Or:     <div class="img-side-row">[<a>]<img>[</a>]<div class="img-side-text">…</div></div>[<p>caption</p>]
      if (el.classList.contains('img-wrap')) {
        const hasSideText = el.classList.contains('has-side-text');
        // Find the image whether it's bare or wrapped in a link
        const img = el.querySelector(
          ':scope > img, :scope > a > img, :scope > .img-side-row > img, :scope > .img-side-row > a > img'
        );
        // If the image has an <a> ancestor inside this wrap, that's the shop link
        let link = '';
        let anchor = null;
        if (img) {
          anchor = img.closest('a');
          if (anchor && el.contains(anchor)) link = anchor.getAttribute('href') || '';
          else anchor = null;
        }
        // Caption is always a direct child <p> of .img-wrap, not anything inside .img-side-text
        const cap = el.querySelector(':scope > p');
        const sideTextEl = hasSideText ? el.querySelector(':scope > .img-side-row > .img-side-text') : null;
        const alignCls = Array.from(el.classList).find(c => c.startsWith('align-'));
        // Width may live on the <a> wrapper (current emitter) or on the <img>
        // (legacy/no-link path). Prefer the wrapper's width when both are set.
        const anchorWidth = anchor && anchor.style && anchor.style.width;
        const imgWidth = img && img.style && img.style.width;
        const widthStr = anchorWidth || imgWidth || '100%';
        const capAlignRaw = cap && cap.style && cap.style.textAlign ? cap.style.textAlign : '';
        const captionAlign = ['left', 'center', 'right'].includes(capAlignRaw) ? capAlignRaw : 'center';
        return {
          type: 'image',
          src: img ? img.getAttribute('src') : '',
          align: alignCls ? alignCls.replace('align-', '') : 'center',
          width: widthStr.replace('%', '') || '100',
          caption: cap ? (cap.textContent || '').trim() : '',
          captionAlign,
          hasSideText,
          sideTextHtml: sideTextEl ? sideTextEl.innerHTML.trim() : '',
          link
        };
      }

      // Editor-generated gallery (current format):
      //   <div class="post-gallery">
      //     <figure class="gallery-figure">
      //       [<a><img></a> | <img>]
      //       <figcaption>…</figcaption>
      //     </figure>
      //   </div>
      // Legacy format had bare <img class="gallery-slide"> or
      // <a class="gallery-slide-link"><img></a> as direct children of
      // .post-gallery, with a separate <p class="gallery-caption"> sibling.
      // Both shapes round-trip; legacy slides are re-emitted as figures on save.
      if (el.classList.contains('post-gallery')) {
        const slides = [];
        // New format: <figure class="gallery-figure">
        const figures = el.querySelectorAll(':scope > figure.gallery-figure');
        if (figures.length > 0) {
          figures.forEach(fig => {
            const a = fig.querySelector(':scope > a');
            const img = fig.querySelector('img');
            const capEl = fig.querySelector(':scope > figcaption');
            slides.push({
              src: img ? img.getAttribute('src') : '',
              link: a ? (a.getAttribute('href') || '') : '',
              caption: capEl ? (capEl.textContent || '').trim() : ''
            });
          });
        } else {
          // Legacy: bare slides as direct children of .post-gallery
          el.querySelectorAll(':scope > .gallery-slide, :scope > .gallery-slide-link').forEach(node => {
            if (node.tagName === 'IMG') {
              slides.push({ src: node.getAttribute('src'), link: '', caption: '' });
            } else if (node.tagName === 'A') {
              const img = node.querySelector('img');
              slides.push({
                src: img ? img.getAttribute('src') : '',
                link: node.getAttribute('href') || '',
                caption: ''
              });
            }
          });
        }
        return {
          type: 'gallery',
          visible: el.dataset.visible || '1',
          slides
        };
      }

      // Editor-generated PDF embed (current format):
      //   <div class="pdf-embed" data-filename="…">
      //     <a class="pdf-card" href="…pdf" download="…" style="width:N%;">
      //       <iframe class="pdf-preview" src="…pdf#toolbar=0…"></iframe>
      //     </a>
      //   </div>
      // Legacy format had the iframe as a sibling of the <a> with the width on
      // the iframe and an icon+name+hint card inside the <a>. Both round-trip.
      if (el.classList.contains('pdf-embed')) {
        const anchor = el.querySelector(':scope > a.pdf-card');
        const previewEl = el.querySelector(':scope iframe.pdf-preview');
        const anchorWidth = anchor && anchor.style && anchor.style.width;
        const iframeWidth = previewEl && previewEl.style && previewEl.style.width;
        const previewWidthStr = (anchorWidth || iframeWidth || '').replace('%', '');
        return {
          type: 'pdf',
          src: anchor ? (anchor.getAttribute('href') || '') : '',
          filename: anchor ? (anchor.getAttribute('download') || el.dataset.filename || 'document.pdf')
                           : (el.dataset.filename || 'document.pdf'),
          previewWidth: previewWidthStr || '100'
        };
      }

      // Editor-generated hero: <div class="post-hero [ratio-X-Y]"><img.hero-image><div.hero-text>…</div></div>
      if (el.classList.contains('post-hero')) {
        const heroImg = el.querySelector('.hero-image');
        const textEl = el.querySelector('.hero-text');
        const headingEl = textEl ? (textEl.querySelector('h2') || textEl.querySelector('h3')) : null;
        const bodyEl = textEl ? textEl.querySelector('p') : null;
        const ratioCls = Array.from(el.classList).find(c => c.startsWith('ratio-'));
        return {
          type: 'hero',
          image: heroImg && heroImg.tagName === 'IMG' ? heroImg.getAttribute('src') : '',
          headingTag: headingEl ? headingEl.tagName.toLowerCase() : 'h2',
          headingHtml: headingEl ? headingEl.innerHTML : '',
          bodyHtml: bodyEl ? bodyEl.innerHTML : '',
          ratio: ratioCls ? ratioCls.replace('ratio-', '') : '50-50'
        };
      }

      // Lede paragraph: <p class="lede"> — return ahead of the generic <p>
      // branch so it round-trips as its own block type instead of getting
      // flattened into a normal text block on next save.
      if (tag === 'p' && el.classList.contains('lede')) {
        return { type: 'lede', html: el.innerHTML };
      }

      // Standard text / heading / list / blockquote blocks
      if (['p', 'h2', 'h3', 'h4', 'blockquote', 'ul', 'ol'].includes(tag)) {
        const block = { type: tag, html: el.innerHTML };
        // Headings carry an optional .is-bold class for bold weight
        if (['h2', 'h3', 'h4'].includes(tag) && el.classList.contains('is-bold')) {
          block.bold = true;
        }
        return block;
      }

      // Gallery caption emitted by generatePostHTML as a <p.gallery-caption>
      if (tag === 'p' && el.classList.contains('gallery-caption')) {
        return null; // swallowed — we don't round-trip captions precisely yet
      }

      // Unknown element — wrap as a paragraph so at least the content survives
      return { type: 'p', html: el.outerHTML };
    }

    // ============================================================
    // POPULATE CANVAS FROM PARSED BLOCKS
    // ============================================================
    function populateEditorFromParsed(parsed) {
      // Meta fields
      document.getElementById('postTitle').value = parsed.title || '';
      document.getElementById('postAuthor').value = parsed.author || 'Isabella Rivera';
      // Only set category if it matches one of the dropdown options
      const catSelect = document.getElementById('postCategory');
      const validCats = Array.from(catSelect.options).map(o => o.value);
      if (validCats.includes(parsed.category)) {
        catSelect.value = parsed.category;
      }

      // Header image
      headerImageUrl = parsed.headerImage || '';
      applyHeaderImage();

      // Clear canvas and block counter
      const canvas = document.getElementById('editorCanvas');
      canvas.innerHTML = '';
      blockCounter = 0;

      parsed.blocks.forEach(pb => {
        if (['p', 'h2', 'h3', 'h4', 'blockquote', 'ul', 'ol', 'lede'].includes(pb.type)) {
          const block = addBlock(pb.type);
          const editable = block.querySelector('[contenteditable]');
          if (editable) editable.innerHTML = pb.html || '';
          // Restore bold state on heading blocks (round-trip from .is-bold class)
          if (pb.bold && editable) {
            editable.classList.add('is-bold');
            const boldBtn = block.querySelector('.header-bold-toggle');
            if (boldBtn) boldBtn.classList.add('active');
          }
        } else if (pb.type === 'image-placeholder') {
          // Legacy Squarespace placeholder — insert as a text block with a note.
          // User can replace with a real image block later.
          const block = addBlock('p');
          const editable = block.querySelector('[contenteditable]');
          if (editable) editable.innerHTML = `<em>[Image placeholder: ${escapeHtmlText(pb.text)}]</em>`;
        } else if (pb.type === 'image') {
          const block = document.createElement('div');
          block.className = 'content-block image-block';
          block.dataset.blockType = 'image';
          block.dataset.blockId = ++blockCounter;
          block.dataset.width = pb.width || '100';
          block.dataset.align = pb.align || 'center';
          block.dataset.captionAlign = pb.captionAlign || 'center';
          block.dataset.link = pb.link || '';
          if (pb.link) block.classList.add('has-link');
          block.innerHTML = controlsHTML() + `
            <div class="img-container" style="width:${pb.width || '100'}%;">
              <img src="${pb.src}" alt="Blog image">
            </div>
            <div class="image-toolbar">
              <label>Width</label>
              <input type="range" min="20" max="100" value="${pb.width || '100'}" oninput="updateImageWidth(this)">
              <span class="width-label">${pb.width || '100'}%</span>
              <label>Image</label>
              <div class="align-buttons image-align-buttons">
                <button class="${pb.align === 'left' ? 'active' : ''}" onclick="setImageAlign(this, 'left')">L</button>
                <button class="${(!pb.align || pb.align === 'center') ? 'active' : ''}" onclick="setImageAlign(this, 'center')">C</button>
                <button class="${pb.align === 'right' ? 'active' : ''}" onclick="setImageAlign(this, 'right')">R</button>
              </div>
              <label>Caption</label>
              <div class="align-buttons caption-align-buttons">
                <button class="${pb.captionAlign === 'left' ? 'active' : ''}" onclick="setCaptionAlign(this, 'left')">L</button>
                <button class="${(!pb.captionAlign || pb.captionAlign === 'center') ? 'active' : ''}" onclick="setCaptionAlign(this, 'center')">C</button>
                <button class="${pb.captionAlign === 'right' ? 'active' : ''}" onclick="setCaptionAlign(this, 'right')">R</button>
              </div>
              <button class="side-text-btn" onclick="toggleSideText(this)">+ Side text</button>
            </div>
            <div class="image-link-row">
              <label>Link</label>
              <input type="url" placeholder="https://... (optional, makes image clickable to shop)" value="${(pb.link || '').replace(/"/g, '&quot;')}" oninput="updateImageLink(this)">
            </div>
            <div class="caption" contenteditable="true" style="text-align:${pb.captionAlign || 'center'};">${pb.caption || 'Add caption'}</div>
          `;
          insertBlockInCanvas(block);
          applyImageAlignment(block);
          applyCaptionAlignment(block);
          if (pb.hasSideText) {
            addSideText(block, pb.sideTextHtml || '');
          }
        } else if (pb.type === 'gallery') {
          const block = addBlock('gallery');
          const gallery = block.querySelector('.post-gallery');
          const firstNav = gallery.querySelector('.gallery-nav');
          // Set visible count
          gallery.dataset.visible = pb.visible || '1';
          const visSelect = block.querySelector('.gallery-editor-controls select');
          if (visSelect) visSelect.value = pb.visible || '1';
          // Build a figure for each parsed slide with its per-image link
          // and caption. Legacy slides (no caption parsed) get an empty
          // figcaption that the user can fill in via the caption input.
          (pb.slides || []).forEach(slide => {
            const fig = createGalleryFigure(slide.src || '', slide.link || '', slide.caption || '');
            gallery.insertBefore(fig, firstNav);
          });
          gallery.dataset.slide = '0';
          refreshSlideshow(block);
        } else if (pb.type === 'hero') {
          const block = addBlock('hero');
          if (pb.ratio && pb.ratio !== '50-50') {
            block.classList.add(`ratio-${pb.ratio}`);
            const sel = block.querySelector('.hero-options select');
            if (sel) sel.value = pb.ratio;
          }
          if (pb.image) {
            const slot = block.querySelector('.hero-image-slot');
            const existing = slot.querySelector('img');
            if (existing) existing.remove();
            const img = document.createElement('img');
            img.src = pb.image;
            img.alt = 'Hero image';
            slot.insertBefore(img, slot.firstChild);
          }
          const heroText = block.querySelector('.hero-text');
          if (heroText) {
            const h = heroText.querySelector('h2, h3');
            if (h && pb.headingHtml) h.innerHTML = pb.headingHtml;
            const p = heroText.querySelector('p');
            if (p && pb.bodyHtml) p.innerHTML = pb.bodyHtml;
          }
        } else if (pb.type === 'pdf') {
          createPdfBlock(pb.src || '', pb.filename || 'document.pdf', null, pb.previewWidth || '100');
        }
      });
    }

    // Small HTML-escape helper used by the load list and placeholder notes.
    function escapeHtmlText(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ===== KEYBOARD SHORTCUTS =====
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'b') { e.preventDefault(); formatCmd('bold'); }
      if ((e.metaKey || e.ctrlKey) && e.key === 'i') { e.preventDefault(); formatCmd('italic'); }
      if ((e.metaKey || e.ctrlKey) && e.key === 'u') { e.preventDefault(); formatCmd('underline'); }
    });
  </script>
</body>
</html>
